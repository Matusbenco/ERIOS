<!DOCTYPE html><html lang="sk"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0B201D"><meta name="apple-mobile-web-app-capable" content="yes">
<title>ERIOS — Prihlásenie</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Source+Sans+3:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"><style>
:root{--crimson:#C8003C;--magenta:#98154B;--plum:#6C2448;--teal:#0C5448;--teal-ink:#0B201D;
  --paper:#FAF8F3;--ink:#0E211C;--teal-light:#7FD9C9;
  --grad:linear-gradient(100deg,var(--crimson) 0%,var(--magenta) 32%,var(--plum) 55%,var(--teal) 100%);
  --font-d:'Manrope',system-ui,sans-serif;--font-b:'Source Sans 3',system-ui,sans-serif;--font-m:'JetBrains Mono',ui-monospace,monospace}
*{margin:0;padding:0;box-sizing:border-box}

html,body{height:100%}
body{font-family:var(--font-b);color:var(--paper);background:#050b0a;-webkit-font-smoothing:antialiased}
#app{width:100%;min-height:100svh;overflow:hidden;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

#app{position:relative;display:flex;flex-direction:column;isolation:isolate;
  background:radial-gradient(130% 110% at 78% 12%,#15463c 0%,var(--teal-ink) 50%,#050b0a 100%)}
#app::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(72% 44% at 80% 5%,rgba(200,0,60,.15),transparent 60%),radial-gradient(82% 54% at 8% 105%,rgba(12,84,72,.32),transparent 60%),radial-gradient(rgba(127,217,201,.06) 1px,transparent 1.4px) 0 0/22px 22px}
#app::after{content:"";position:absolute;left:0;right:0;height:170px;z-index:5;pointer-events:none;top:-190px;opacity:0;
  background:linear-gradient(180deg,transparent,rgba(127,217,201,.20) 60%,rgba(127,217,201,.48));mix-blend-mode:screen}
#app.scanning::after{animation:sweep 1.25s cubic-bezier(.4,0,.2,1) infinite}
@keyframes sweep{0%{top:-190px;opacity:0}12%{opacity:1}88%{opacity:1}100%{top:106%;opacity:0}}

.statusbar{position:relative;z-index:6;display:flex;justify-content:space-between;align-items:center;padding:14px 24px 0;font-family:var(--font-m);font-size:11px;letter-spacing:.04em;color:#9fc3ba}
.statusbar .ind{display:flex;gap:4px;align-items:center}
.statusbar .ind i{width:4px;height:4px;border-radius:50%;background:var(--teal-light);opacity:.5}
.statusbar .ind i:nth-child(-n+3){opacity:1}
.batt{width:22px;height:11px;border:1px solid #6f938b;border-radius:3px;position:relative;display:inline-block;vertical-align:middle}
.batt::before{content:"";position:absolute;inset:2px;right:6px;background:var(--teal-light);border-radius:1px}
.batt::after{content:"";position:absolute;right:-3px;top:3px;width:2px;height:5px;background:#6f938b;border-radius:0 1px 1px 0}

.wrap{position:relative;z-index:6;flex:1;display:flex;flex-direction:column;justify-content:center;padding:18px 26px}
.group{display:flex;flex-direction:column;gap:clamp(34px,6vh,52px)}
.brand{display:flex;flex-direction:column;align-items:center}
.logo-live{display:flex;align-items:center;justify-content:center;height:clamp(50px,14vw,62px)}
.logo-live .eri{height:100%;width:auto;display:block}
.logo-live .s{height:100%;width:auto;display:block;margin-left:13px}
.logo-live .o-spin{height:100%;aspect-ratio:1;display:block;margin-left:15px;filter:drop-shadow(0 0 10px rgba(127,217,201,.25));transition:filter .3s}
.o-spin circle{fill:var(--teal-light)}
.o-spin .ring{transform-origin:50px 50px}
.o-spin .rA{animation:spin 42s linear infinite}.o-spin .rB{animation:spin 30s linear infinite reverse}.o-spin .rC{animation:spin 22s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#app.focused .o-spin{filter:drop-shadow(0 0 16px rgba(127,217,201,.55)) brightness(1.12)}
#app.scanning .o-spin .rA{animation-duration:6s}#app.scanning .o-spin .rC{animation-duration:4s}
#app.error .logo-live{animation:shake .42s cubic-bezier(.36,.07,.19,.97)}
@keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-6px)}40%,60%{transform:translateX(6px)}}

.born-grad{margin-top:24px;font-family:var(--font-d);font-weight:800;font-size:clamp(30px,9vw,42px);line-height:1.02;letter-spacing:-.01em;text-align:center;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}

.card{background:linear-gradient(180deg,rgba(127,217,201,.10),rgba(127,217,201,.03));border:1px solid rgba(127,217,201,.16);border-radius:24px;padding:24px 22px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 26px 54px -24px rgba(0,0,0,.7)}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.card-head h2{font-family:var(--font-d);font-weight:700;font-size:19px;letter-spacing:-.01em}
.card-head .mode{font-family:var(--font-m);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal-light);display:flex;align-items:center;gap:6px}
.mode .pip{width:6px;height:6px;border-radius:50%;background:var(--teal-light);box-shadow:0 0 8px var(--teal-light)}
.field-label{font-family:var(--font-m);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#a9c4bc;margin-bottom:9px;display:block}
.field{position:relative;display:flex;align-items:center;gap:12px;background:rgba(5,11,10,.55);border:1.5px solid rgba(127,217,201,.2);border-radius:14px;padding:0 14px;height:56px;transition:border-color .2s,box-shadow .2s,background .2s}
#app.focused .field{border-color:var(--teal-light);box-shadow:0 0 0 4px rgba(127,217,201,.12);background:rgba(5,11,10,.7)}
#app.error .field{border-color:#ff476f;box-shadow:0 0 0 4px rgba(200,0,60,.16)}
.field .scan-ic{flex:0 0 auto;width:24px;height:24px;color:var(--teal-light);opacity:.9}
.field input{flex:1;background:none;border:0;outline:none;color:var(--paper);font-family:var(--font-m);font-size:15px;letter-spacing:.18em;height:100%}
.field input::placeholder{color:#5f7a72;letter-spacing:.1em}
.hint{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:12.5px;color:#8fb0a8;min-height:16px;transition:color .2s}
.hint .pip{width:6px;height:6px;border-radius:50%;background:var(--teal-light);box-shadow:0 0 8px var(--teal-light);flex:0 0 auto}
#app.scanning .hint{color:var(--teal-light)}#app.error .hint{color:#ff7d9c}
#app.error .hint .pip{background:#ff476f;box-shadow:0 0 8px #ff476f}
.btn{margin-top:22px;width:100%;height:56px;border:0;cursor:pointer;border-radius:14px;background:var(--grad);background-size:170% 100%;color:#fff;font-family:var(--font-d);font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 16px 34px -14px rgba(200,0,60,.6);transition:transform .16s,box-shadow .25s,background-position .4s}
.btn:hover{transform:translateY(-2px);background-position:100% 0;box-shadow:0 22px 44px -14px rgba(200,0,60,.7)}
.btn:active{transform:translateY(0)}
.btn .arr{transition:transform .2s}.btn:hover .arr{transform:translateX(4px)}
.methods{display:flex;align-items:center;justify-content:center;gap:9px;margin-top:18px}
.methods .key{font-family:var(--font-m);font-size:10.5px;letter-spacing:.08em;border:1px solid rgba(127,217,201,.25);border-radius:8px;padding:6px 12px;color:#a9c4bc}
.foot{position:relative;z-index:6;display:flex;align-items:center;justify-content:center;gap:10px;padding:0 26px 16px;font-family:var(--font-m);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#5f7a72}
.foot .bar{width:1px;height:11px;background:rgba(127,217,201,.22)}
.homebar{position:relative;z-index:6;width:120px;height:4px;border-radius:99px;background:rgba(127,217,201,.4);margin:0 auto 9px}

/* on desktop, frame it to phone width so it's previewable there too */
@media (min-width:520px){
  body{display:grid;place-items:center;min-height:100vh;background:radial-gradient(60vw 60vw at 80% 0,rgba(200,0,60,.08),transparent 60%),#070d0c;padding:24px}
  #app{width:400px;min-height:auto;height:840px;max-height:92vh;border-radius:30px;border:1px solid rgba(127,217,201,.12);box-shadow:0 50px 90px -30px rgba(0,0,0,.8)}
}

const deck=document.querySelectorAll('.deck button');deck.forEach(b=>b.addEventListener('click',()=>set(b.dataset.s)));
pw.addEventListener('focus',()=>set('focused'));pw.addEventListener('blur',()=>{if(!pw.value)set('rest')});
