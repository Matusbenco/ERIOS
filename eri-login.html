<style>
:root{--crimson:#C8003C;--magenta:#98154B;--plum:#6C2448;--teal:#0C5448;--teal-ink:#0B201D;
  --paper:#FAF8F3;--ink:#0E211C;--teal-light:#7FD9C9;
  --grad:linear-gradient(100deg,var(--crimson) 0%,var(--magenta) 32%,var(--plum) 55%,var(--teal) 100%);
  --font-d:'Manrope',system-ui,sans-serif;--font-b:'Source Sans 3',system-ui,sans-serif;--font-m:'JetBrains Mono',ui-monospace,monospace}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%}
body{font-family:var(--font-b);color:var(--paper);background:#050b0a;-webkit-font-smoothing:antialiased}

#app{position:relative;min-height:100svh;overflow:hidden;isolation:isolate;display:flex;align-items:center;justify-content:center;
  padding:clamp(20px,5vw,48px);
  padding-top:max(clamp(20px,5vw,48px),env(safe-area-inset-top));
  padding-bottom:max(clamp(20px,5vw,48px),env(safe-area-inset-bottom));
  padding-left:max(clamp(20px,5vw,48px),env(safe-area-inset-left));
  padding-right:max(clamp(20px,5vw,48px),env(safe-area-inset-right));
  background:radial-gradient(120% 100% at 78% 8%,#15463c 0%,var(--teal-ink) 52%,#050b0a 100%)}

/* ===== živé pozadie: pulzujúce "oko" (prevzaté zo sekcie Born in industry) ===== */
.bg{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg .blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.5;mix-blend-mode:screen;will-change:transform}
.bg .b1{width:54vw;height:54vw;background:radial-gradient(circle,var(--crimson),transparent 68%);top:-16%;left:-12%;animation:blobA 19s ease-in-out infinite}
.bg .b2{width:50vw;height:50vw;background:radial-gradient(circle,var(--teal),transparent 68%);bottom:-20%;right:-10%;animation:blobB 23s ease-in-out infinite}
.bg .b3{width:42vw;height:42vw;background:radial-gradient(circle,var(--magenta),transparent 70%);top:22%;left:44%;animation:blobC 27s ease-in-out infinite}
.bg .dots{position:absolute;inset:-25%;background-image:radial-gradient(rgba(127,217,201,.22) 1.3px,transparent 1.6px);background-size:26px 26px;opacity:.5;
  animation:dotsDrift 26s linear infinite;
  -webkit-mask-image:radial-gradient(circle at 50% 50%,#000 10%,transparent 72%);mask-image:radial-gradient(circle at 50% 50%,#000 10%,transparent 72%)}
/* oko — sústredné pulzujúce krúžky + jemná zrenička */
.eye{position:absolute;top:50%;left:50%;width:min(88vw,860px);aspect-ratio:1;transform:translate(-50%,-50%);border-radius:50%;
  border:1px solid rgba(127,217,201,.20);
  box-shadow:0 0 0 46px rgba(127,217,201,.055),0 0 0 104px rgba(127,217,201,.035),0 0 0 168px rgba(127,217,201,.02);
  animation:eyePulse 6s ease-in-out infinite}
.eye::before{content:"";position:absolute;inset:18%;border-radius:50%;border:1px solid rgba(127,217,201,.14);
  animation:eyePulse 6s ease-in-out infinite reverse}
.eye::after{content:"";position:absolute;inset:36%;border-radius:50%;
  background:radial-gradient(circle,rgba(127,217,201,.16),rgba(127,217,201,.04) 55%,transparent 72%);
  animation:pupil 6s ease-in-out infinite}

@keyframes blobA{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(8vw,5vw) scale(1.12)}}
@keyframes blobB{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-7vw,-4vw) scale(1.15)}}
@keyframes blobC{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-6vw,4vw) scale(1.1)}66%{transform:translate(5vw,-5vw) scale(.92)}}
@keyframes dotsDrift{to{transform:translate(26px,26px)}}
@keyframes eyePulse{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.045)}}
@keyframes pupil{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.12)}}

/* centered column */
.shell{position:relative;z-index:6;width:100%;max-width:430px;display:flex;flex-direction:column;align-items:center;gap:clamp(24px,4.5vh,38px)}

/* brand — väčšie, výraznejšie logo */
.brand{display:flex;flex-direction:column;align-items:center;gap:20px;text-align:center;
  opacity:0;animation:rise .8s .06s cubic-bezier(.2,.7,.2,1) forwards}
.logo-live{display:flex;align-items:center;justify-content:center;height:clamp(62px,18vw,92px)}
.logo-live .eri{height:100%;width:auto;display:block;filter:drop-shadow(0 6px 22px rgba(0,0,0,.45))}
.logo-live .s{height:100%;width:auto;display:block;margin-left:16px;filter:drop-shadow(0 6px 22px rgba(0,0,0,.45))}
.logo-live .o-spin{height:100%;aspect-ratio:1;display:block;margin-left:18px;filter:drop-shadow(0 0 22px rgba(127,217,201,.55))}
.o-spin circle{fill:var(--teal-light)}.o-spin .ring{transform-origin:50px 50px}
.o-spin .rA{animation:spin 42s linear infinite}.o-spin .rB{animation:spin 30s linear infinite reverse}.o-spin .rC{animation:spin 22s linear infinite}
.born-grad{font-family:var(--font-d);font-weight:800;font-size:clamp(27px,7.5vw,36px);line-height:1.04;letter-spacing:-.015em;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}

/* card */
.card{width:100%;background:linear-gradient(180deg,rgba(11,32,29,.62),rgba(11,32,29,.46));
  border:1px solid rgba(127,217,201,.18);border-radius:26px;padding:clamp(24px,6vw,34px);
  backdrop-filter:blur(18px) saturate(1.1);-webkit-backdrop-filter:blur(18px) saturate(1.1);box-shadow:0 34px 80px -30px rgba(0,0,0,.8);
  opacity:0;animation:rise .8s .18s cubic-bezier(.2,.7,.2,1) forwards}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;gap:14px}
.card-head h1{font-family:var(--font-d);font-weight:700;font-size:21px;letter-spacing:-.01em;line-height:1.15}
.card-head .sub{font-size:13px;color:#9fc3ba;margin-top:5px}
.mode{font-family:var(--font-m);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal-light);
  display:flex;align-items:center;gap:6px;white-space:nowrap;padding-top:4px}
.mode .pip{width:6px;height:6px;border-radius:50%;background:var(--teal-light);box-shadow:0 0 8px var(--teal-light)}

.field-label{font-family:var(--font-m);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#a9c4bc;margin:18px 0 9px;display:block}
.field-label:first-of-type{margin-top:0}
.field{position:relative;display:flex;align-items:center;gap:12px;background:rgba(5,11,10,.6);
  border:1.5px solid rgba(127,217,201,.2);border-radius:14px;padding:0 14px;height:54px;
  transition:border-color .2s,box-shadow .2s,background .2s}
.field.on{border-color:var(--teal-light);box-shadow:0 0 0 4px rgba(127,217,201,.12);background:rgba(5,11,10,.78)}
#app.error .field{border-color:#ff476f;box-shadow:0 0 0 4px rgba(200,0,60,.16)}
.field .ic{flex:0 0 auto;width:21px;height:21px;color:var(--teal-light);opacity:.9}
.field input{flex:1;min-width:0;background:none;border:0;outline:none;color:var(--paper);font-family:var(--font-b);font-size:16px;height:100%}
.field input::placeholder{color:#5f7a72}
.field .eye-t{flex:0 0 auto;width:22px;height:22px;color:#7c9a92;cursor:pointer;transition:color .2s}
.field .eye-t:hover{color:var(--teal-light)}

.row{display:flex;align-items:center;justify-content:space-between;margin-top:16px;gap:10px}
.remember{display:flex;align-items:center;gap:9px;cursor:pointer;font-size:13.5px;color:#c6ddd6;user-select:none}
.box{width:18px;height:18px;border-radius:6px;border:1.5px solid rgba(127,217,201,.4);display:grid;place-items:center;transition:.18s;flex:0 0 auto}
.remember input{display:none}
.remember input:checked + .box{background:var(--grad);border-color:transparent}
.box svg{width:11px;height:11px;color:#fff;opacity:0;transition:.18s;transform:scale(.6)}
.remember input:checked + .box svg{opacity:1;transform:scale(1)}
.forgot{font-size:13.5px;color:var(--teal-light);text-decoration:none;transition:.2s}
.forgot:hover{text-decoration:underline;text-underline-offset:3px}

.hint{display:flex;align-items:center;gap:8px;margin-top:14px;min-height:16px;font-size:12.5px;color:#8fb0a8;transition:color .2s}
.hint .pip{width:6px;height:6px;border-radius:50%;background:var(--teal-light);box-shadow:0 0 8px var(--teal-light);flex:0 0 auto;opacity:0;transition:.2s}
#app.scanning .hint{color:var(--teal-light)}#app.scanning .hint .pip{opacity:1}
#app.error .hint{color:#ff7d9c}#app.error .hint .pip{opacity:1;background:#ff476f;box-shadow:0 0 8px #ff476f}

.btn{margin-top:20px;width:100%;height:54px;border:0;cursor:pointer;border-radius:14px;background:var(--grad);background-size:170% 100%;
  color:#fff;font-family:var(--font-d);font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;gap:9px;
  box-shadow:0 16px 34px -14px rgba(200,0,60,.6);transition:transform .16s,box-shadow .25s,background-position .4s}
.btn:hover{transform:translateY(-2px);background-position:100% 0;box-shadow:0 22px 44px -14px rgba(200,0,60,.7)}
.btn:active{transform:translateY(0)}
.btn .arr{transition:transform .2s}.btn:hover .arr{transform:translateX(4px)}
#app.scanning .btn{pointer-events:none;opacity:.85}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#5f7a72;font-family:var(--font-m);font-size:10px;letter-spacing:.16em;text-transform:uppercase}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(127,217,201,.16)}
.btn-sso{width:100%;height:50px;border:1px solid rgba(127,217,201,.25);background:rgba(127,217,201,.05);cursor:pointer;border-radius:14px;
  color:var(--paper);font-family:var(--font-d);font-weight:600;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:10px;
  transition:border-color .2s,background .2s,transform .16s}
.btn-sso:hover{border-color:var(--teal-light);background:rgba(127,217,201,.1);transform:translateY(-1px)}
.btn-sso svg{width:18px;height:18px;color:var(--teal-light)}

.note{margin-top:20px;text-align:center;font-size:12.5px;color:#8fb0a8}
.note a{color:var(--teal-light);text-decoration:none}.note a:hover{text-decoration:underline;text-underline-offset:3px}

.foot{display:flex;align-items:center;justify-content:center;gap:11px;font-family:var(--font-m);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:#7a958c;
  opacity:0;animation:rise .8s .34s cubic-bezier(.2,.7,.2,1) forwards}
.foot .bar{width:1px;height:11px;background:rgba(127,217,201,.22)}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
#app.error .card{animation:shake .42s cubic-bezier(.36,.07,.19,.97)}
@keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-6px)}40%,60%{transform:translateX(6px)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important}.brand,.card,.foot{opacity:1}.eye{opacity:.8}}

@media (max-width:380px){
  .card{padding:22px 18px;border-radius:22px}
  .card-head h1{font-size:19px}
  .born-grad{font-size:24px}
}
@media (display-mode:standalone){
  #app{padding-top:max(34px,env(safe-area-inset-top))}
}

      <h1 class="born-grad">Born in industry.</h1>
    </div>

    <div class="card">
      <div class="card-head">
        <div>
          <h1>Prihlásenie</h1>
          <p class="sub">Zadajte prístupové údaje do ERI OS.</p>
        </div>
        <span class="mode" id="mode"><span class="pip"></span>Pripravený</span>
      </div>

      <label class="field-label" for="user">Prihlasovacie meno / e-mail</label>
      <div class="field" id="f-user">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input id="user" type="text" inputmode="email" placeholder="meno@firma.sk" autocomplete="username" spellcheck="false">
      </div>

      <label class="field-label" for="pw">Heslo</label>
      <div class="field" id="f-pw">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input id="pw" type="password" placeholder="Zadajte heslo" autocomplete="current-password" spellcheck="false">
        <svg class="eye-t" id="eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
      </div>

      <div class="row">
        <label class="remember"><input type="checkbox" id="remember"><span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>Zostať prihlásený</label>
        <a class="forgot" href="#" id="forgot">Zabudnuté heslo?</a>
      </div>

      <div class="hint" id="hint"><span class="pip"></span><span id="hint-txt">Spojenie je šifrované (TLS)</span></div>

      <button class="btn" id="loginBtn">Prihlásiť sa <span class="arr">&rarr;</span></button>

      <div class="divider">alebo</div>

<script>
const app=document.getElementById('app'),user=document.getElementById('user'),pw=document.getElementById('pw'),
  btn=document.getElementById('loginBtn'),mode=document.getElementById('mode'),hintTxt=document.getElementById('hint-txt'),
  fUser=document.getElementById('f-user'),fPw=document.getElementById('f-pw'),eye=document.getElementById('eye');

const st={
  rest:{m:'Pripravený',h:'Spojenie je šifrované (TLS)'},
  focused:{m:'Zadávanie',h:'Zadajte prihlasovacie údaje'},
  scanning:{m:'Overujem…',h:'Overujem prístupové údaje…'},
  error:{m:'Odmietnuté',h:'Nesprávne meno alebo heslo — skúste znova'}
};
function set(s){app.className=(s==='rest'?'':s);mode.innerHTML='<span class="pip"></span>'+st[s].m;hintTxt.textContent=st[s].h;}

[ [user,fUser],[pw,fPw] ].forEach(([inp,box])=>{
  inp.addEventListener('focus',()=>{box.classList.add('on');if(!app.className)set('focused');});
  inp.addEventListener('blur',()=>{box.classList.remove('on');if(!user.value&&!pw.value)set('rest');});
});

eye.addEventListener('click',()=>{
  const show=pw.type==='password';pw.type=show?'text':'password';
  eye.style.color=show?'var(--teal-light)':'';
});

function attempt(){
  set('scanning');
  setTimeout(()=>{
    if(user.value.trim().length>=4 && pw.value.length>=4){
      mode.innerHTML='<span class="pip"></span>Vitajte';hintTxt.textContent='Prihlásenie úspešné — presmerúvam…';app.className='';
    } else { set('error'); }
  },1300);
}
btn.addEventListener('click',attempt);
[user,pw].forEach(i=>i.addEventListener('keydown',e=>{if(e.key==='Enter')attempt();}));

document.getElementById('ssoBtn').addEventListener('click',()=>{set('scanning');hintTxt.textContent='Presmerúvam na firemné konto…';});
document.getElementById('forgot').addEventListener('click',e=>{e.preventDefault();hintTxt.textContent='Odkaz na obnovu hesla bol odoslaný na e-mail.';});
document.getElementById('install').addEventListener('click',e=>e.preventDefault());
</script></body></html>
